<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التصويت الخاص | طلبات المساعدة</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Text', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%);
            min-height: 100vh;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            direction: rtl;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(110, 120, 150, 0.12);
            border-top: 5px solid #5b8cce;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            color: #1e3a5f;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #4a5b7a;
        }

        .required-star {
            color: #c23d2b;
            margin-right: 4px;
        }

        .voter-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #dce3ec;
            border-radius: 15px;
            font-size: 15px;
            background: #fdfdfd;
            font-family: inherit;
            transition: 0.2s;
            text-align: right;
        }

        .voter-input:focus {
            outline: none;
            border-color: #6b8fbd;
            box-shadow: 0 0 0 3px rgba(87, 118, 157, 0.1);
        }

        .voter-input.error-border {
            border-color: #c23d2b;
            background-color: #fff5f5;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2c5a8c;
            color: white;
            box-shadow: 0 4px 12px rgba(44, 90, 140, 0.2);
        }

        .btn-primary:hover {
            background: #1e3a5f;
            transform: translateY(-1px);
        }

        .vote-options {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .opt-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #eef2f8;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .opt-btn.selected-approve {
            background: #e3f7ec;
            border-color: #2b7a48;
            color: #1f7840;
        }

        .opt-btn.selected-reject {
            background: #ffe9e9;
            border-color: #c23d2b;
            color: #bc3f2e;
        }

        .info-box {
            background: #f7f9fe;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #e4ebf5;
        }

        .info-item {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #dce3ec;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .info-item:last-child { 
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label { 
            font-weight: 700; 
            color: #1e3a5f; 
            min-width: 120px;
            font-size: 14px;
        }

        .info-value { 
            color: #2c3e50; 
            flex: 1;
            text-align: left;
            font-size: 14px;
            word-break: break-word;
        }

        .info-value.amount {
            color: #2b7a48;
            font-weight: 700;
        }

        .info-value.urgent {
            color: #c23d2b;
            font-weight: 700;
        }

        .status-msg {
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .error { background: #feeceb; color: #b13b2a; }
        .success { background: #e2f3e8; color: #1a6e42; }
        .warning { background: #fff3e0; color: #c07a3a; }

        .footer-credits {
            text-align: center;
            margin-top: auto;
            background: linear-gradient(135deg, #1e3a5f, #2b4a6e);
            border-radius: 50px;
            padding: 12px 30px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2c5a8c;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #fff3e0; color: #c07a3a; }
        .status-approved { background: #e3f7ec; color: #1f7840; }
        .status-rejected { background: #feeceb; color: #bc3f2e; }

        .urgency-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .urgency-urgent { background: #feeceb; color: #bc3f2e; }
        .urgency-normal { background: #e3f7ec; color: #1f7840; }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1e3a5f;
            margin: 15px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #5b8cce;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شاشة الدخول -->
        <div id="loginSection" class="card">
            <h1>تسجيل دخول للتصويت</h1>
            <div class="input-group">
                <label class="input-label">
                    الاسم الرباعي
                    <span class="required-star">*</span>
                </label>
                <input type="text" id="voterName" class="voter-input" placeholder="أدخل اسمك الكامل (رباعي)">
            </div>
            <div class="input-group">
                <label class="input-label">
                    مكان الإقامة
                    <span class="required-star">*</span>
                </label>
                <input type="text" id="voterAddress" class="voter-input" placeholder="المحافظة / المدينة">
            </div>
            <div class="input-group">
                <label class="input-label">
                    رقم الحالة
                    <span class="required-star">*</span>
                </label>
                <input type="text" id="caseIdInput" class="voter-input" placeholder="أدخل رقم الحالة المسجل">
            </div>
            <button class="btn btn-primary" onclick="accessCase()">دخول</button>
            <div id="loginMsg"></div>
        </div>

        <!-- شاشة تفاصيل الحالة والتصويت -->
        <div id="voteSection" class="card hidden">
            <h1>تفاصيل حالة المساعدة</h1>
            <div id="caseDetails" class="info-box">
                <!-- ستظهر جميع تفاصيل الحالة هنا -->
            </div>

            <div style="margin-top: 20px;">
                <div class="section-title">تصويت اللجنة</div>
                <h3 style="font-size: 16px; color: #4a5b7a; margin: 15px 0 10px 0;">رأيك في الحالة:</h3>
                <div class="vote-options">
                    <button id="btnApprove" class="opt-btn" onclick="selectOption('موافق')">موافق</button>
                    <button id="btnReject" class="opt-btn" onclick="selectOption('غير موافق')">غير موافق</button>
                </div>

                <button class="btn btn-primary" id="btnSubmitVote" onclick="submitFinalVote()">إرسال التصويت</button>
                <button class="btn" style="background: #f0f0f0; color: #666;" onclick="location.reload()">رجوع</button>
                <div id="voteMsg"></div>
            </div>
        </div>
    </div>

    <div class="footer-credits">
        <div style="font-size: 14px; margin-bottom: 5px;">المشرف العام : مصطفى الشجاع</div>
        <div style="font-size: 12px; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 5px;">تطوير النظام : عمرو مسعد الشجاع</div>
    </div>

    <script>
        // تكوين Firebase (نفس قاعدة بيانات لوحة التحكم)
        const firebaseConfig = {
            apiKey: "AIzaSyBzX7_q2Abx0pL9L5aMvzJ6I3hDdc8bXy8",
            authDomain: "magdi-50c75.firebaseapp.com",
            databaseURL: "https://magdi-50c75-default-rtdb.firebaseio.com",
            projectId: "magdi-50c75",
            storageBucket: "magdi-50c75.firebasestorage.app",
            appId: "1:329518389376:web:f2f73f4a257dcb84efee65"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const rtDb = firebase.database();

        let currentCaseData = null;
        let selectedVote = null;
        let voterInfo = { name: '', address: '', caseId: '' };

        // أنواع الحالات للترجمة
        const caseTypeLabels = {
            'accident': 'حادث',
            'disease': 'مرض',
            'treatment': 'علاج',
            'travelTreatment': 'سفر للعلاج',
            'marriage': 'زواج',
            'zakatCharity': 'صدقة زكاة',
            'financialAid': 'مساعدة مالية',
            'other': 'أخرى'
        };

        // دالة لعرض رسائل الخطأ على الحقول
        function showFieldError(inputId) {
            const element = document.getElementById(inputId);
            element.classList.add('error-border');
            setTimeout(() => {
                element.classList.remove('error-border');
            }, 2000);
        }

        function clearFieldError(inputId) {
            const element = document.getElementById(inputId);
            element.classList.remove('error-border');
        }

        async function accessCase() {
            const name = document.getElementById('voterName').value.trim();
            const address = document.getElementById('voterAddress').value.trim();
            const caseId = document.getElementById('caseIdInput').value.trim();
            const msg = document.getElementById('loginMsg');

            // التحقق من إجبارية جميع الحقول
            let hasError = false;
            
            if (!name) {
                showFieldError('voterName');
                hasError = true;
            } else {
                clearFieldError('voterName');
            }
            
            if (!address) {
                showFieldError('voterAddress');
                hasError = true;
            } else {
                clearFieldError('voterAddress');
            }
            
            if (!caseId) {
                showFieldError('caseIdInput');
                hasError = true;
            } else {
                clearFieldError('caseIdInput');
            }

            if (hasError) {
                msg.innerHTML = '<div class="status-msg error">يرجى ملء جميع الحقول الإجبارية (*)</div>';
                return;
            }

            msg.innerHTML = '<div class="loader"></div> جاري البحث عن الحالة...';

            try {
                const snapshot = await rtDb.ref(`assistanceRequests/${caseId}`).once('value');
                if (snapshot.exists()) {
                    currentCaseData = snapshot.val();
                    voterInfo = { name, address, caseId };
                    displayCase();
                    msg.innerHTML = '';
                } else {
                    msg.innerHTML = '<div class="status-msg error">رقم الحالة غير صحيح أو غير موجود</div>';
                }
            } catch (error) {
                console.error(error);
                msg.innerHTML = '<div class="status-msg error">حدث خطأ في الاتصال بقاعدة البيانات</div>';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'pending': return 'قيد المراجعة';
                case 'approved': return 'مقبول';
                case 'rejected': return 'مرفوض';
                default: return status || 'غير محدد';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'status-pending';
                case 'approved': return 'status-approved';
                case 'rejected': return 'status-rejected';
                default: return '';
            }
        }

        function getCurrencyText(currency) {
            if (currency === 'sar') return 'ريال سعودي';
            if (currency === 'usd') return 'دولار أمريكي';
            return 'ريال يمني';
        }

        function getCaseTypeText(type) {
            return caseTypeLabels[type] || type || 'غير محدد';
        }

        function formatDate(dateString) {
            if (!dateString) return 'غير محدد';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch(e) {
                return dateString;
            }
        }

        function displayCase() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('voteSection').classList.remove('hidden');

            const detailsDiv = document.getElementById('caseDetails');
            const data = currentCaseData;

            // إظهار جميع تفاصيل الحالة
            detailsDiv.innerHTML = `
                <div class="info-item">
                    <span class="info-label">📋 رقم الحالة:</span>
                    <span class="info-value">${data.id || voterInfo.caseId}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">🏷️ اسم الحالة:</span>
                    <span class="info-value">${data.caseName || 'غير محدد'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👤 مقدم الطلب:</span>
                    <span class="info-value">${data.requesterName || 'غير محدد'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📂 نوع الحالة:</span>
                    <span class="info-value">${getCaseTypeText(data.caseType)}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📝 تفاصيل الحالة:</span>
                    <span class="info-value">${data.caseDetails || 'لا توجد تفاصيل إضافية'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">💰 المبلغ المطلوب:</span>
                    <span class="info-value amount">${(data.requestAmount || 0).toLocaleString()} ${getCurrencyText(data.preferredCurrency)}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">💵 العملة المفضلة:</span>
                    <span class="info-value">${getCurrencyText(data.preferredCurrency)}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📊 تقرير الدخل:</span>
                    <span class="info-value">${data.incomeReport || 'لا يوجد تقرير دخل'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">⚡ مستوى الاستعجال:</span>
                    <span class="info-value ${data.urgencyLevel === 'urgent' ? 'urgent' : ''}">
                        <span class="urgency-badge ${data.urgencyLevel === 'urgent' ? 'urgency-urgent' : 'urgency-normal'}">
                            ${data.urgencyLevel === 'urgent' ? '🚨 مستعجل' : '✅ غير مستعجل'}
                        </span>
                    </span>
                </div>
                <div class="info-item">
                    <span class="info-label">📅 تاريخ التقديم:</span>
                    <span class="info-value">${formatDate(data.requestDate)}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📍 موقع التقديم:</span>
                    <span class="info-value">${data.location || 'غير محدد'}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📌 حالة الطلب:</span>
                    <span class="info-value">
                        <span class="status-badge ${getStatusClass(data.status)}">
                            ${getStatusText(data.status)}
                        </span>
                    </span>
                </div>
                <div class="info-item">
                    <span class="info-label">👨‍💻 مقدم بواسطة:</span>
                    <span class="info-value">${data.submittedBy || 'غير محدد'}</span>
                </div>
                ${data.reviewedBy ? `
                <div class="info-item">
                    <span class="info-label">🔍 تمت المراجعة بواسطة:</span>
                    <span class="info-value">${data.reviewedBy}</span>
                </div>
                ` : ''}
                ${data.reviewedAt ? `
                <div class="info-item">
                    <span class="info-label">📅 تاريخ المراجعة:</span>
                    <span class="info-value">${new Date(data.reviewedAt).toLocaleDateString('ar-EG')}</span>
                </div>
                ` : ''}
            `;

            // إذا كانت الحالة مقبولة أو مرفوضة، نعرض رسالة للمستخدم
            if (data.status === 'approved') {
                const voteMsgDiv = document.getElementById('voteMsg');
                voteMsgDiv.innerHTML = '<div class="status-msg warning">⚠️ هذه الحالة تمت الموافقة عليها مسبقاً، لا يمكن التصويت عليها.</div>';
                document.getElementById('btnSubmitVote').disabled = true;
                document.getElementById('btnSubmitVote').style.opacity = '0.5';
                document.getElementById('btnApprove').disabled = true;
                document.getElementById('btnReject').disabled = true;
            } else if (data.status === 'rejected') {
                const voteMsgDiv = document.getElementById('voteMsg');
                voteMsgDiv.innerHTML = '<div class="status-msg error">❌ هذه الحالة تم رفضها مسبقاً، لا يمكن التصويت عليها.</div>';
                document.getElementById('btnSubmitVote').disabled = true;
                document.getElementById('btnSubmitVote').style.opacity = '0.5';
                document.getElementById('btnApprove').disabled = true;
                document.getElementById('btnReject').disabled = true;
            }
        }

        function selectOption(val) {
            selectedVote = val;
            const btnApprove = document.getElementById('btnApprove');
            const btnReject = document.getElementById('btnReject');

            if (val === 'موافق') {
                btnApprove.className = 'opt-btn selected-approve';
                btnReject.className = 'opt-btn';
            } else {
                btnReject.className = 'opt-btn selected-reject';
                btnApprove.className = 'opt-btn';
            }
        }

        async function submitFinalVote() {
            const msg = document.getElementById('voteMsg');
            
            if (!selectedVote) {
                msg.innerHTML = '<div class="status-msg error">يرجى اختيار (موافق) أو (غير موافق) أولاً</div>';
                return;
            }

            // التحقق من أن الحالة لا تزال pending
            if (currentCaseData.status !== 'pending') {
                msg.innerHTML = '<div class="status-msg error">لا يمكن التصويت على هذه الحالة لأنها تمت مراجعتها مسبقاً</div>';
                return;
            }

            const votePath = `assistanceRequests/${voterInfo.caseId}/votes/${voterInfo.name}`;
            
            try {
                const check = await rtDb.ref(votePath).once('value');
                if (check.exists()) {
                    msg.innerHTML = '<div class="status-msg error">لقد قمت بالتصويت على هذه الحالة مسبقاً</div>';
                    return;
                }

                await rtDb.ref(votePath).set({
                    vote: selectedVote,
                    address: voterInfo.address,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                msg.innerHTML = '<div class="status-msg success">✓ تم إرسال تصويتك بنجاح. شكراً لك.</div>';
                document.getElementById('btnSubmitVote').disabled = true;
                document.getElementById('btnSubmitVote').style.opacity = '0.5';
                document.getElementById('btnApprove').disabled = true;
                document.getElementById('btnReject').disabled = true;

            } catch (error) {
                console.error(error);
                msg.innerHTML = '<div class="status-msg error">حدث خطأ أثناء إرسال التصويت</div>';
            }
        }
    </script>
</body>
</html>
